name: security-gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  manifest-consistency:
    name: plugin.json ↔ skills/ on-disk consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Each manifest entry has a SKILL.md on disk
        run: |
          set -e
          node -e "
            const fs = require('fs');
            const path = require('path');
            const plugin = JSON.parse(fs.readFileSync('plugin.json','utf8'));
            const missing = [];
            for (const s of plugin.skills) {
              const skillFile = path.join(s.path, 'SKILL.md');
              if (!fs.existsSync(skillFile)) missing.push(skillFile);
            }
            if (missing.length) {
              console.error('Missing SKILL.md for manifest entries:\n  ' + missing.join('\n  '));
              process.exit(1);
            }
            console.log('OK — ' + plugin.skills.length + ' manifest entries all resolve on disk.');
          "
      - name: Every on-disk skill is registered in plugin.json
        run: |
          set -e
          node -e "
            const fs = require('fs');
            const path = require('path');
            const plugin = JSON.parse(fs.readFileSync('plugin.json','utf8'));
            const registered = new Set(plugin.skills.map(s => s.path.replace(/\\\\/g,'/')));
            const onDisk = [];
            for (const root of ['skills/_vendor', 'skills/tigerai']) {
              for (const d of fs.readdirSync(root)) {
                const full = path.posix.join(root, d);
                if (fs.existsSync(path.join(full, 'SKILL.md'))) onDisk.push(full);
              }
            }
            const orphans = onDisk.filter(p => !registered.has(p));
            if (orphans.length) {
              console.error('Skills on disk not in plugin.json:\n  ' + orphans.join('\n  '));
              process.exit(1);
            }
            console.log('OK — ' + onDisk.length + ' on-disk skills all registered.');
          "

  json-audit:
    name: case-study workflow JSON lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Google Workspace admin audit
        working-directory: examples/google-workspace-admin-workflow
        run: node _audit.mjs
      - name: LINE CS (cloud) audit
        working-directory: examples/line-ai-customer-service
        run: node _audit.mjs
      - name: LINE CS (on-prem) workflow JSON parses
        run: |
          node -e "
            const j = JSON.parse(require('fs').readFileSync('examples/line-ai-customer-service-onprem/n8n_workflow_export.json','utf8'));
            if (!Array.isArray(j.nodes) || j.nodes.length < 1) { console.error('no nodes'); process.exit(1); }
            console.log('on-prem brain: ' + j.nodes.length + ' nodes, ' + Object.keys(j.connections||{}).length + ' connection groups.');
          "

  secret-scan:
    name: lightweight secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for high-confidence secret patterns
        run: |
          set -e
          patterns='sk-[A-Za-z0-9]{20,}|AKIA[0-9A-Z]{16}|ghp_[A-Za-z0-9]{30,}|xox[baprs]-[A-Za-z0-9-]{10,}|-----BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY-----'
          hits=$(git ls-files | grep -v -E '^(reference-workflows/|research/|tests/REPORT)' | xargs -I{} grep -lE "$patterns" "{}" 2>/dev/null || true)
          if [ -n "$hits" ]; then
            echo "Possible secrets:"
            echo "$hits"
            exit 1
          fi
          echo "OK — no high-confidence secret patterns outside vetted dirs."

  installer-parse:
    name: install / uninstall scripts — parse + dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: bash -n install.sh / uninstall.sh
        run: |
          bash -n install.sh
          bash -n uninstall.sh
      - name: install.ps1 / uninstall.ps1 have UTF-8 BOM (PowerShell 5.1 Chinese-safe)
        run: |
          set -e
          for f in install.ps1 uninstall.ps1; do
            head -c 3 "$f" | od -An -tx1 | tr -d ' \n' > /tmp/bom.hex
            test "$(cat /tmp/bom.hex)" = "efbbbf" || { echo "$f missing UTF-8 BOM (got $(cat /tmp/bom.hex))"; exit 1; }
            echo "OK — $f starts with EF BB BF."
          done
      - name: install.ps1 / uninstall.ps1 parse under PowerShell Core
        shell: pwsh
        run: |
          foreach ($f in @('install.ps1','uninstall.ps1')) {
            $errors = $null; $tokens = $null
            [System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path "./$f"), [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              $errors | ForEach-Object { Write-Error $_.Message }
              exit 1
            }
            Write-Host "OK — $f parses clean."
          }
      - name: install.sh --dry-run --target claude (smoke)
        run: bash install.sh --target claude --dry-run | tail -5
      - name: uninstall.sh --dry-run --target claude (smoke)
        run: bash uninstall.sh --target claude --dry-run | tail -5
      - name: install.ps1 / uninstall.ps1 --dry-run smoke (pwsh)
        shell: pwsh
        run: |
          ./install.ps1 -Target claude -DryRun | Select-Object -Last 5
          ./uninstall.ps1 -Target claude -DryRun | Select-Object -Last 5

  workflow-security-scan:
    name: deterministic workflow security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan case-study + template workflow JSON
        run: |
          node scripts/security-scan.mjs --glob "examples/**/*.workflow.json" --format markdown
          node scripts/security-scan.mjs --glob "examples/templates/*.workflow.json"
      - name: Scan on-prem brain JSON
        run: node scripts/security-scan.mjs examples/line-ai-customer-service-onprem/n8n_workflow_export.json --format markdown

  dependency-cve:
    name: case-study npm audit (HIGH+ is a gate, not advisory — SEC-017)
    runs-on: ubuntu-latest
    # v0.36.0 SEC-017 fix: removed continue-on-error. HIGH+ CVE now fails the gate.
    strategy:
      fail-fast: false
      matrix:
        case:
          - examples/line-ai-customer-service
          - examples/line-ai-customer-service-onprem
          - examples/einvoice-n8n/svc
    steps:
      - uses: actions/checkout@v4
      - name: npm audit (HIGH+ fails the build)
        working-directory: ${{ matrix.case }}
        run: |
          if [ ! -f package.json ]; then
            echo "No package.json — skip."
            exit 0
          fi
          # SEC-017: audit failures must fail the gate; no || fallback.
          # If a transient false-positive needs to be ignored, add to package.json
          # "overrides" or document in SECURITY-REVIEW with a tracked exception.
          npm audit --omit=dev --audit-level=high

  container-scan:
    name: container image scan (Trivy) — SEC-018 Tier 2
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - { name: on-prem case fs scan, scan-type: fs, scan-ref: examples/line-ai-customer-service-onprem }
          - { name: einvoice svc fs scan, scan-type: fs, scan-ref: examples/einvoice-n8n/svc }
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan — ${{ matrix.target.name }}
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: ${{ matrix.target.scan-type }}
          scan-ref: ${{ matrix.target.scan-ref }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'             # v0.37.0 SEC-018: HIGH/CRITICAL is a gate, not advisory

  ext-dep-skill-enforcement:
    name: external-dependency-security Skill auto-enforcement (v0.39.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # need PR base + head for diff

      # Gate 1 — §1.8: any new npm dep in svc must have SEC-DEP entry
      - name: SEC-DEP entry exists for every new npm dep
        run: |
          set -e
          # Diff package.json files between base + head (on push) or just compare to HEAD~1
          BASE_SHA="${{ github.event.pull_request.base.sha || github.event.before }}"
          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            BASE_SHA=$(git rev-parse HEAD~1 2>/dev/null || echo "HEAD")
          fi
          echo "Comparing base=$BASE_SHA → HEAD"

          # Find new dependencies in any package.json (added or version changed)
          NEW_DEPS=$(git diff "$BASE_SHA" HEAD -- '**/package.json' 2>/dev/null | \
            grep -E '^\+\s+"[^"]+":\s*"[^"]+"' | \
            grep -oE '"[^"]+":\s*"[^"]+"' | \
            grep -vE '"//|"name":|"version":|"description":|"scripts":|"author":|"license":|"private":|"type":|"main":|"engines":' | \
            grep -oE '"[^"]+"' | head -1 | tr -d '"' || true)
          # Loop: read all lines individually
          DIFF_OUTPUT=$(git diff "$BASE_SHA" HEAD -- '**/package.json' 2>/dev/null || true)
          if [ -z "$DIFF_OUTPUT" ]; then
            echo "OK — no package.json changes."
            exit 0
          fi
          # Extract added dep names (lines starting with '+' inside "dependencies"/"devDependencies" blocks)
          ADDED=$(echo "$DIFF_OUTPUT" | grep -E '^\+\s+"@?[a-z][a-z0-9_./-]+":\s*"' | \
            grep -vE '"name":|"version":|"description":|"scripts":|"engines":|"type":|"main":|"private":|"license":|"author":|"//' | \
            sed -E 's/^\+\s+"([^"]+)":.*/\1/' || true)
          if [ -z "$ADDED" ]; then
            echo "OK — no dep additions detected."
            exit 0
          fi
          echo "=== New / changed npm deps ==="
          echo "$ADDED"
          echo "=== SEC-DEP entries check ==="
          MISSING=""
          for dep in $ADDED; do
            # SEC-DEP entry id form: SEC-DEP-<sanitized>-<version>
            sanitized=$(echo "$dep" | sed 's|@||g; s|/|-|g')
            if ! grep -q "SEC-DEP-$sanitized" examples/einvoice-n8n/SECURITY-REVIEW.md 2>/dev/null && \
               ! find . -name SECURITY-REVIEW.md -exec grep -lq "SEC-DEP-$sanitized" {} \; 2>/dev/null; then
              echo "MISSING: SEC-DEP-$sanitized for $dep"
              MISSING="$MISSING $dep"
            else
              echo "OK: $dep has SEC-DEP entry"
            fi
          done
          if [ -n "$MISSING" ]; then
            echo ""
            echo "::error::external-dependency-security Skill §1.8 violation:"
            echo "::error::new dep(s) without SEC-DEP entry: $MISSING"
            echo "::error::see skills/tigerai/external-dependency-security/SKILL.md §1.5"
            exit 1
          fi

      # Gate 2 — §1.6: no caret/tilde/range in svc package.json deps
      - name: package.json exact-pin enforcement (no caret/tilde/range)
        run: |
          set -e
          BAD=""
          for pj in $(find . -name 'package.json' -not -path './node_modules/*' -not -path './examples/line-ai-customer-service-onprem/*'); do
            # Skip if it's not in our svc / case directories
            case "$pj" in
              ./examples/*/svc/package.json|./examples/*/api/package.json) ;;
              *) continue ;;
            esac
            CARET=$(node -e "
              const p = JSON.parse(require('fs').readFileSync('$pj','utf8'));
              const offenders = [];
              for (const section of ['dependencies','devDependencies']) {
                for (const [name, ver] of Object.entries(p[section] || {})) {
                  if (/^[\^~><=]/.test(ver)) offenders.push(name + '@' + ver);
                }
              }
              if (offenders.length) console.log(offenders.join('\n'));
            ")
            if [ -n "$CARET" ]; then
              echo "::error::$pj has range specifiers (SEC-017 violation):"
              echo "$CARET" | sed 's/^/  - /'
              BAD="$BAD $pj"
            else
              echo "OK — $pj all pins are exact."
            fi
          done
          if [ -n "$BAD" ]; then
            exit 1
          fi

      # Gate 3 — §3: GitHub raw URLs in committed files must lock commit sha (not branch)
      - name: GitHub raw URLs must use commit sha (not branch)
        run: |
          set -e
          # Pattern: raw.githubusercontent.com/<owner>/<repo>/<ref>/<path>
          # If <ref> is not a 40-char hex sha, fail.
          OFFENDERS=$(git ls-files | xargs grep -hoE 'raw\.githubusercontent\.com/[^/]+/[^/]+/[^/[:space:]"'"'"']+' 2>/dev/null | \
            sort -u | \
            grep -vE 'raw\.githubusercontent\.com/[^/]+/[^/]+/[a-f0-9]{40}/' || true)
          if [ -n "$OFFENDERS" ]; then
            echo "::error::external-dependency-security Skill §3 violation:"
            echo "::error::GitHub raw URLs must lock commit sha (40-char hex), not branch name:"
            echo "$OFFENDERS" | sed 's/^/  - /'
            echo "Fix: replace /main/ or /master/ with the commit sha."
            exit 1
          fi
          echo "OK — all GitHub raw URLs lock commit sha (or none present)."

      # Gate 4 — §5.2: Dockerfile FROM lines must hash-pin via @sha256:
      - name: Dockerfile FROM must hash-pin (sha256 digest)
        run: |
          set -e
          BAD=""
          for df in $(find . -name 'Dockerfile' -not -path './node_modules/*'); do
            # Skip vendor / on-prem case (their hardening is tracked separately)
            case "$df" in
              ./examples/line-ai-customer-service-onprem/*) continue ;;
            esac
            # Extract FROM lines. Allow either:
            #  (a) FROM image@sha256:...
            #  (b) FROM ${ARG_NAME} (where ARG is declared and has @sha256: in default)
            # We use a simple rule: FROM line must contain @sha256: OR be a variable ref
            # whose ARG default contains @sha256:.
            UNPINNED=$(grep -E '^FROM ' "$df" | grep -vE '@sha256:|\$\{[A-Z_]+\}' || true)
            if [ -n "$UNPINNED" ]; then
              echo "::warning::$df has unpinned FROM (SEC-018 advisory):"
              echo "$UNPINNED" | sed 's/^/  - /'
              # Don't fail the gate for unpinned-via-ARG (since svc Dockerfile uses ARG approach).
              # Only fail if BOTH no @sha256 AND no ARG.
              if ! grep -qE 'ARG\s+[A-Z_]*(IMAGE|DIGEST)' "$df"; then
                echo "::error::$df: no @sha256: pin AND no ARG/DIGEST var — Skill §5.2 violation"
                BAD="$BAD $df"
              else
                echo "    (allowed: ARG-based digest pattern detected in $df)"
              fi
            else
              echo "OK — $df FROM lines hash-pinned."
            fi
          done
          if [ -n "$BAD" ]; then
            exit 1
          fi

  sbom-generate:
    name: SBOM generation (CycloneDX) — SEC-018 Tier 2
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Generate SBOM for einvoice-svc (CycloneDX)
        working-directory: examples/einvoice-n8n/svc
        run: |
          if [ ! -f package.json ]; then
            echo "No package.json — skip."
            exit 0
          fi
          npm install --omit=dev --omit=optional --no-audit --no-fund
          npx --yes @cyclonedx/cyclonedx-npm@^1.19 --output-format json --output-file sbom.json
          echo "=== SBOM (CycloneDX 1.5) ==="
          jq '{spec: .specVersion, version: .version, components: (.components | length)}' sbom.json
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: einvoice-svc-sbom
          path: examples/einvoice-n8n/svc/sbom.json
          retention-days: 90

  live-roundtrip:
    name: n8n REST round-trip (optional — needs secrets)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' }}
    env:
      N8N_API_URL: ${{ secrets.N8N_API_URL }}
      N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Round-trip templates + case-study core workflows
        run: |
          node scripts/live-roundtrip.mjs --glob "examples/templates/*.workflow.json"
          node scripts/live-roundtrip.mjs --glob "examples/**/core/*.workflow.json"
